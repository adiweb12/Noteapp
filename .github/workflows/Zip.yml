name: Unzip Only (No Commit)

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Install unzip
        run: sudo apt-get install unzip

      - name: 📂 Unzip files
        run: |
          mkdir extracted
          for file in *.zip; do
            unzip -o "$file" -d extracted
          done

      - name: 📁 Show files
        run: |
          echo "Extracted files:"
          ls -R extracted

      - name: 📤 Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: extracted-files
          path: extracted
