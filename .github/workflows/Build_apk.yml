name: Unzip and Commit Files

on:
  push:
    paths:
      - '*.zip'   # triggers when zip is pushed

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Install unzip
        run: sudo apt-get install unzip

      - name: 📂 Unzip files
        run: |
          for file in *.zip; do
            unzip -o "$file" -d extracted
          done

      - name: 📁 Move files to root
        run: |
          cp -r extracted/* .
          rm -rf extracted *.zip

      - name: 📝 Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-unzipped and updated files" || echo "No changes"

      - name: 🚀 Push changes
        run: |
          git push
